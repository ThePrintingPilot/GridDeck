name: Build and publish GridDeck firmware

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.5.1"

      - name: Install ESP32 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.8

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "lvgl@9.3.0"
          arduino-cli lib install "GFX Library for Arduino@1.6.4"
          arduino-cli lib install "ArduinoJson@7.4.3"
          arduino-cli lib install "TAMC_GT911@1.0.2"
          mkdir -p "$HOME/Arduino/libraries"
          cp Arduino-libraries/lv_conf.h "$HOME/Arduino/libraries/lv_conf.h"

      - name: Verify tag and firmware version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(grep -oP '#define FW_VERSION\s+"\K[^"]+' GridDeck/config.h)"
          echo "Tag version: $TAG"
          echo "Firmware version: $VERSION"
          test "$TAG" = "$VERSION" || {
            echo "The tag and FW_VERSION must match."
            exit 1
          }

      - name: Compile OTA firmware
        run: |
          rm -rf build dist
          mkdir -p build dist
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:CPUFreq=240,FlashMode=dio,FlashSize=4M,PartitionScheme=min_spiffs,PSRAM=opi,LoopCore=1,EventsCore=1,USBMode=hwcdc,CDCOnBoot=cdc,UploadMode=default,UploadSpeed=921600,DebugLevel=none,EraseFlash=none" \
            --warnings all \
            --export-binaries \
            --output-dir build \
            GridDeck
          cp build/GridDeck.ino.bin dist/GridDeck.bin

      - name: Verify OTA partition size and create checksum
        shell: bash
        run: |
          SIZE="$(stat -c%s dist/GridDeck.bin)"
          MAX_SIZE=1966080
          echo "GridDeck.bin: $SIZE bytes"
          echo "OTA slot limit: $MAX_SIZE bytes"
          test "$SIZE" -le "$MAX_SIZE" || {
            echo "Firmware is too large for the Minimal SPIFFS OTA slot."
            exit 1
          }
          (cd dist && sha256sum GridDeck.bin > GridDeck.sha256)
          cat dist/GridDeck.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GridDeck-firmware-${{ github.ref_name }}
          path: |
            dist/GridDeck.bin
            dist/GridDeck.sha256

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/GridDeck.bin \
              dist/GridDeck.sha256 \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/GridDeck.bin \
              dist/GridDeck.sha256 \
              --title "GridDeck $GITHUB_REF_NAME" \
              --generate-notes
          fi
